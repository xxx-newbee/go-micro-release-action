name: 'Go Project Release Action'
description: '一个自动编译 Go 项目并发布到 GitHub Release 的自定义工具'
author: 'xxx'

# 定义输入参数，这样你在调用时可以自定义
inputs:
  github_token:
    description: 'GitHub Token，用于发布 Release'
    required: true
  binary_name:
    description: '编译后的二进制文件名'
    required: true
    default: 'app'
  go_version:
    description: 'Go 语言版本'
    required: false
    default: '1.21'
  project_path:
    description: '项目路径，默认为当前目录'
    required: false
    default: '.'

# 定义运行环境
runs:
  using: 'composite' # 使用 composite 模式，允许直接运行 shell 脚本
  steps:
    # 步骤 1: 安装 Go 环境
    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ inputs.go_version }}

    # 步骤 2: 执行交叉编译脚本
    - name: Build Binaries
      shell: bash # 指定使用 bash
      run: |
        set -e # 遇到错误时退出
        echo "🔨 开始编译项目: ${{ inputs.binary_name }}"
        export GOPROXY=https://goproxy.cn,direct
        
        # 定义目标平台
        PLATFORMS="linux/amd64 linux/arm64 windows/amd64 darwin/amd64 darwin/arm64"
        
        mkdir -p build_output # 创建输出目录
        
        for platform in $PLATFORMS; do
          GOOS=${platform%/*}
          GOARCH=${platform#*/}
          
          # Windows 加 .exe
          EXT=""
          if [ "$GOOS" = "windows" ]; then
            EXT=".exe"
          fi
          
          OUTPUT_FILE="build_output/${{ inputs.binary_name }}-${GOOS}-${GOARCH}${EXT}"
          
          echo "   -> 编译中: $GOOS/$GOARCH"
          # 进入指定目录编译
          cd ${{ inputs.project_path }}
          GOOS=$GOOS GOARCH=$GOARCH go build -o ../$OUTPUT_FILE .
          cd - > /dev/null
        done
        
        ls -al build_output/ # 列出编译结果

    # 步骤 3: 上传到 Release
    - name: Release
      uses: softprops/action-gh-release@v1
      with:
        files: build_output/* # 上传编译好的所有文件
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}